email.login_code.text_intro = ລະຫັດເຂົ້າສູ່ລະບົບ Mochi ຂອງທ່ານແມ່ນ: {code}
email.login_code.text_body = ປ້ອນລະຫັດນີ້ໃນບຣາວເຊີຂອງທ່ານເພື່ອເຂົ້າສູ່ລະບົບ. ລະຫັດໝົດອາຍຸໃນ 1 ຊົ່ວໂມງ.

