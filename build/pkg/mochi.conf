# Mochi main configuration file for macOS
# After editing this file, run: launchctl kickstart -k system/org.mochi-os.server

[directories]
cache = /var/cache/mochi
data = /var/lib/mochi

[email]
host = localhost
port = 25

[p2p]
port = 1443

[web]
# Listen on http://localhost/ only.
# Comment these lines out if uncommenting the lines below.
listen = 127.0.0.1
port = 80

# To listen on https://yourdomain/, comment out the above lines and
# uncomment these lines and set your domain.

#port = 443
#domain = yourdomain
