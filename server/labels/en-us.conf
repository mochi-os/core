[labels]

# US-English overlay for core server's own error strings.
#
# Empty body — core's en.conf uses neutral English ("allowed" not "authorised",
# "summary" not "summarise") per CLAUDE.md, so there are no UK→US spellings to
# rewrite at this level. The fallback chain (en-us → en) returns the en value
# for every key.
#
# This file's existence is what puts en-us in the language picker. To add any
# other language, drop the matching <tag>.conf file in this directory and
# rebuild — installed_languages() discovers it automatically.

# Server upgrade notifications (added by update_manager work)
