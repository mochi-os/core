errors.entity_not_found = Entidade não encontrada
errors.file_not_found = Ficheiro não encontrado
errors.invalid_attachment_id = ID de anexo inválido
errors.invalid_file = Ficheiro inválido
errors.no_file_specified = Nenhum ficheiro especificado
errors.not_found = Não encontrado
errors.unable_to_cache_file = Não foi possível pôr o ficheiro em cache
errors.unable_to_create_identity = Não foi possível criar a identidade

# Failed creation
errors.failed_to_create_token = Falha ao criar token

# Database
errors.database_error = Erro de base de dados

# i18n / labels endpoint
