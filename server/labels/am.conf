email.login_code.tagline = ለመግባት ይህን ኮድ በአሳሽዎ ውስጥ ያስገቡ
email.login_code.expiry = ይህ ኮድ በ1 ሰዓት ውስጥ ያበቃል
email.login_code.ignore = ይህን ኮድ ካልጠየቁ፣ ይህን ኢሜይል ችላ ማለት ይችላሉ።
email.login_code.text_intro = የእርስዎ Mochi የመግቢያ ኮድ፦ {code}
email.login_code.text_body = ለመግባት ይህን ኮድ በአሳሽዎ ውስጥ ያስገቡ። ኮዱ በ1 ሰዓት ውስጥ ያበቃል።

# Email-account verification email (sent by account_send_verification_email)
email.verification.subject = የኢሜይል አድራሻዎን ያረጋግጡ
email.verification.heading = የማረጋገጫ ኮድ
email.verification.tagline = የኢሜይል አድራሻዎን ለማረጋገጥ ይህን ኮድ ያስገቡ
email.verification.expiry = ይህ ኮድ በ1 ሰዓት ውስጥ ያበቃል
email.verification.ignore = ይህን ማረጋገጫ ካልጠየቁ፣ ይህን ኢሜይል ችላ ማለት ይችላሉ።

# Test notification email and push notification
email.test.subject = Mochi የሙከራ ማሳወቂያ
email.test.heading = Mochi የሙከራ ማሳወቂያ
push.test.title = Mochi የሙከራ ማሳወቂያ

# Server upgrade notifications (added by update_manager work)
update.notification.title = Mochi {version} ይገኛል
update.notification.body = {current} እያሄዱ ነው። ለማሻሻል የስርዓት ሁኔታ ገጽን ይክፈቱ።
update.notification.topic = የአገልጋይ ማሻሻያ ይገኛል
document.not_configured = [አልተዋቀረም]
