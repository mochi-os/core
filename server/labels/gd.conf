errors.bundle_schema_newer = Rinneadh an leth-bhreac glèidhte agad de {app} air tionndadh nas ùire na tha an frithealaiche seo a' toirt taic dha. Iarr air an oibriche {app} ùrachadh, an uair sin feuch a-rithist.
errors.wrong_passphrase = Frasa-faire ceàrr.
errors.entity_collision = Buinidh an lethbhreac-glèidhidh seo do chunntas a tha fhathast gnìomhach air an fhrithealaiche seo. Sguab às an cunntas sin an toiseach, no aisig gu frithealaiche eile.
errors.account_not_fresh = Tha dàta mar-thà aig a' chunntas seo agus chan urrainn dha ath-nuadhachadh fhaighinn. Clàraich airson cunntais ùir agus ath-nuadhaich ann.
