[labels]

# Error labels used by respond_error(c, status, code, key, args). The key
# resolves through the user's language preference (or Accept-Language for
# anonymous requests) with the standard fallback chain. The `code` argument
# is the machine-readable identifier returned in the JSON `error` field;
# this catalog provides the human-readable `message` field.

# Authentication / account state
errors.access_denied = Acesso negado
errors.account_already_set_up = Conta já configurada
errors.app_required = App obrigatória
errors.app_token_mismatch = Token de app não corresponde
errors.app_token_required = É necessário token de app
errors.authentication_failed = Falha na autenticação
errors.authentication_required = É necessária autenticação
errors.auth_required_db = É necessária autenticação para aceder à base de dados
errors.ceremony_expired = A tentativa de início de sessão expirou. Tente novamente.
errors.credential_not_found = Credencial não encontrada
errors.identity_required = Identidade obrigatória
errors.invalid_code = Código inválido
errors.invalid_credential = Credencial inválida
errors.invalid_credentials = Credenciais inválidas
errors.invalid_email = Email inválido
errors.invalid_method = Método inválido
errors.invalid_request = Pedido inválido
errors.missing_code = Código em falta
errors.no_methods = Não há métodos de autenticação disponíveis
errors.not_authenticated = Não autenticado
errors.passkey_disabled = As passkeys estão desativadas
errors.recovery_disabled = A recuperação está desativada
