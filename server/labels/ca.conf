errors.app_token_invalid = Testimoni no vàlid per a aquesta aplicació
errors.unable_to_send_login_email = No s'ha pogut enviar el correu d'inici de sessió
errors.unsupported_method = Mètode no admès
errors.user_error = Error d'usuari
errors.user_not_found = No s'ha trobat l'usuari
errors.webauthn_error = Error de WebAuthn
errors.webauthn_not_configured = WebAuthn no està configurat

# OAuth providers
errors.unknown_provider = Proveïdor desconegut
errors.provider_unavailable = Proveïdor no disponible
errors.server_error = Error del servidor

# Apps / routing
errors.action_has_no_function = L'acció no té cap funció
errors.app_not_found = No s'ha trobat l'aplicació
