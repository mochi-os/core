[labels]

# Error labels used by respond_error(c, status, code, key, args). The key
# resolves through the user's language preference (or Accept-Language for
# anonymous requests) with the standard fallback chain. The `code` argument
# is the machine-readable identifier returned in the JSON `error` field;
# this catalog provides the human-readable `message` field.

# Authentication / account state
errors.access_denied = Access denied
errors.account_already_set_up = Account already set up
errors.app_required = App required
errors.app_token_mismatch = App token mismatch
errors.app_token_required = App token required
errors.authentication_failed = Authentication failed
errors.authentication_required = Authentication required
errors.auth_required_db = Authentication required for database access
errors.ceremony_expired = Sign-in attempt expired. Please try again.
errors.credential_not_found = Credential not found
errors.identity_required = Identity required
errors.invalid_code = Invalid code
errors.invalid_credential = Invalid credential
errors.invalid_credentials = Invalid credentials
errors.invalid_email = Invalid email
errors.invalid_method = Invalid method
errors.invalid_request = Invalid request
errors.missing_code = Missing code
errors.no_methods = No authentication methods available
errors.not_authenticated = Not authenticated
errors.passkey_disabled = Passkeys are disabled
errors.recovery_disabled = Recovery is disabled
errors.session_expired = Session expired
errors.signup_disabled = New user signup is disabled.
errors.suspended = Your account has been suspended.
errors.app_token_invalid = Token not valid for this app
errors.unable_to_send_login_email = Unable to send login email
errors.unsupported_method = Unsupported method
errors.user_error = User error
errors.user_not_found = User not found
errors.webauthn_error = WebAuthn error
errors.webauthn_not_configured = WebAuthn is not configured

# OAuth providers
errors.unknown_provider = Unknown provider
errors.provider_unavailable = Provider unavailable
errors.server_error = Server error

# Apps / routing
errors.action_has_no_function = Action has no function
errors.app_not_found = App not found
errors.no_app_for_entity = No app for entity
errors.no_app_for_class = No app for entity class
errors.no_root_app = No root app configured
errors.unknown_route_method = Unknown route method

# Resources
errors.attachment_not_found = Attachment not found
errors.entity_not_found = Entity not found
errors.file_not_found = File not found
errors.invalid_attachment_id = Invalid attachment ID
errors.invalid_file = Invalid file
errors.no_file_specified = No file specified
errors.not_found = Not found
errors.unable_to_cache_file = Unable to cache file
errors.unable_to_create_identity = Unable to create identity

# Failed creation
errors.failed_to_create_token = Failed to create token

# Database
errors.database_error = Database error

# i18n / labels endpoint
errors.invalid_language_tag = Invalid language tag
errors.labels_not_loaded = Labels not loaded
errors.language_not_installed = Language not installed

# Rate limits
errors.rate_limit_exceeded = Rate limit exceeded. Please try again later.
errors.too_many_logins = Too many login attempts. Please try again later.

# Interests summary fallback (used when no AI account is configured)
interests.summary.liked = Interested in: {list}
interests.summary.disliked = Dislikes: {list}

# Login code email (sent by code_send → email_login_code)
email.login_code.subject = Mochi login code
email.login_code.heading = Login Code
email.login_code.tagline = Enter this code in your browser to sign in
email.login_code.expiry = This code expires in 1 hour
email.login_code.ignore = If you didn't request this code, you can safely ignore this email.
email.login_code.text_intro = Your Mochi login code is: {code}
email.login_code.text_body = Enter this code in your browser to sign in. The code expires in 1 hour.

# Email-account verification email (sent by account_send_verification_email)
email.verification.subject = Verify your email address
email.verification.heading = Verification Code
email.verification.tagline = Enter this code to verify your email address
email.verification.expiry = This code expires in 1 hour
email.verification.ignore = If you didn't request this verification, you can safely ignore this email.

# Test notification email and push notification
email.test.subject = Mochi test notification
email.test.heading = Mochi test notification
email.test.body = Sent via {account}
push.test.title = Mochi test notification
push.test.body = Sent via {account}

# Provider-typed fallbacks for {account} when the row has no user-set label
account.display.fcm = Android device
account.display.unifiedpush = Mobile device
account.display.email = Email
account.display.browser = Browser push
account.display.pushbullet = Pushbullet
account.display.ntfy = ntfy
account.display.url = External URL
errors.shutdown_in_progress = Shutdown already in progress

# OAuth error labels (PKCE / mobile flow)
errors.exchange_invalid = Exchange not found or expired
errors.exchange_verifier_mismatch = PKCE verifier does not match challenge
errors.invalid_challenge = Invalid PKCE challenge
errors.invalid_scheme = Invalid mobile redirect scheme

# Replicate-from-source signup errors (POST /_/auth/replicate)
errors.username_taken = This email is already in use on this server
errors.source_unreachable = Couldn't reach the source server
errors.source_user_not_found = No such user on the source server
errors.already_replicated = This account is already replicated to this server

# Server upgrade notifications (added by update_manager work)
update.notification.title = Mochi {version} is available
update.notification.body = You're running {current}.
update.notification.topic = Server upgrade available

# Sentinel rendered into bundled policy documents when the operator hasn't
# filled in operator_name / operator_email / operator_jurisdiction.
document.not_configured = [not configured]
