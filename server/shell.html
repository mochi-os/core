<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mochi:token" content="{{NOTIF_TOKEN}}">
    <meta name="mochi:shell" content="true">
    <script>(function() {
  var theme = document.cookie.match(/mochi-theme=([^;]+)/);
  theme = theme ? theme[1] : 'light';
  if (theme === 'system') {
    theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }
  if (theme === 'dark') {
    document.documentElement.classList.add('dark');
  }
})();</script>
    <title>Mochi</title>
    <link rel="icon" type="image/svg+xml" href="/images/logo-header.svg">
    {{MENU_CSS}}
    <style>
        html, body { height: 100%; margin: 0; overflow: hidden; }
        #menu { position: fixed; top: 0; left: 0; z-index: 50; }
        #app-container { position: relative; width: 100%; height: 100%; }
        #app-container > iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div id="menu"></div>
    <div id="app-container">
        <iframe
            id="app-frame"
            sandbox="allow-scripts allow-forms allow-popups allow-popups-to-escape-sandbox"
            src="{{IFRAME_SRC}}"
        ></iframe>
    </div>

    <script>
    // Shell configuration injected by server
    window.__mochi_shell = {
        appId: "{{APP_ID}}",
        userName: "{{USER_NAME}}"
    };

    {{SHELL_JS}}
    </script>
    {{MENU_JS}}
</body>
</html>
