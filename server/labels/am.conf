# Failed creation
errors.failed_to_create_token = ቶከን መፍጠር አልተሳካም

# Database
errors.database_error = የመረጃ ቋት ስህተት

# i18n / labels endpoint
errors.invalid_language_tag = ልክ ያልሆነ የቋንቋ መለያ
errors.labels_not_loaded = መለያዎች አልተጫኑም
