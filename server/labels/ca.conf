errors.app_token_mismatch = El testimoni de l'aplicació no coincideix
errors.app_token_required = Cal un testimoni d'aplicació
errors.authentication_failed = L'autenticació ha fallat
errors.authentication_required = Cal autenticació
errors.auth_required_db = Cal autenticació per accedir a la base de dades
errors.ceremony_expired = L'intent d'inici de sessió ha caducat. Torna-ho a provar.
errors.credential_not_found = No s'ha trobat la credencial
errors.identity_required = Cal una identitat
errors.invalid_code = Codi no vàlid
errors.invalid_credential = Credencial no vàlida
errors.invalid_credentials = Credencials no vàlides
errors.invalid_email = Correu electrònic no vàlid
errors.invalid_method = Mètode no vàlid
errors.invalid_request = Sol·licitud no vàlida
errors.missing_code = Falta el codi
errors.no_methods = No hi ha mètodes d'autenticació disponibles
