# Resources
errors.attachment_not_found = No s'ha trobat l'adjunt
errors.entity_not_found = No s'ha trobat l'entitat
errors.file_not_found = No s'ha trobat el fitxer
errors.invalid_attachment_id = Identificador d'adjunt no vàlid
errors.invalid_file = Fitxer no vàlid
errors.no_file_specified = Cap fitxer especificat
errors.not_found = No s'ha trobat
errors.unable_to_cache_file = No s'ha pogut emmagatzemar el fitxer a la memòria cau
errors.unable_to_create_identity = No s'ha pogut crear la identitat

# Failed creation
errors.failed_to_create_token = No s'ha pogut crear el testimoni

# Database
errors.database_error = Error de la base de dades

# i18n / labels endpoint
errors.invalid_language_tag = Etiqueta d'idioma no vàlida
errors.labels_not_loaded = Les etiquetes no s'han carregat
errors.language_not_installed = Idioma no instal·lat

# Rate limits
errors.rate_limit_exceeded = S'ha superat el límit de peticions. Torna-ho a provar més tard.
errors.too_many_logins = Massa intents d'inici de sessió. Torna-ho a provar més tard.

# Interests summary fallback (used when no AI account is configured)
interests.summary.liked = Interessat en: {list}
interests.summary.disliked = No li agraden: {list}

# Login code email (sent by code_send → email_login_code)
email.login_code.subject = Codi d'inici de sessió de Mochi
email.login_code.heading = Codi d'inici de sessió
email.login_code.tagline = Introdueix aquest codi al navegador per iniciar la sessió
email.login_code.expiry = Aquest codi caduca en 1 hora
email.login_code.ignore = Si no has sol·licitat aquest codi, pots ignorar aquest correu amb tota tranquil·litat.
email.login_code.text_intro = El teu codi d'inici de sessió de Mochi és: {code}
email.login_code.text_body = Introdueix aquest codi al navegador per iniciar la sessió. El codi caduca en 1 hora.

# Email-account verification email (sent by account_send_verification_email)
email.verification.subject = Verifica la teva adreça de correu electrònic
email.verification.heading = Codi de verificació
email.verification.tagline = Introdueix aquest codi per verificar la teva adreça de correu electrònic
email.verification.expiry = Aquest codi caduca en 1 hora
email.verification.ignore = Si no has sol·licitat aquesta verificació, pots ignorar aquest correu amb tota tranquil·litat.

# Test notification email and push notification
email.test.subject = Notificació de prova de Mochi
email.test.heading = Notificació de prova de Mochi
push.test.title = Notificació de prova de Mochi
errors.shutdown_in_progress = Aturada ja en curs

# OAuth error labels (PKCE / mobile flow)
errors.exchange_invalid = No s'ha trobat l'intercanvi o ha caducat
errors.exchange_verifier_mismatch = El verificador PKCE no coincideix amb el repte
errors.invalid_challenge = Repte PKCE no vàlid
errors.invalid_scheme = Esquema de redirecció mòbil no vàlid

# Server upgrade notifications (added by update_manager work)
update.notification.title = Mochi {version} està disponible
update.notification.body = Estàs executant {current}.
update.notification.topic = Actualització del servidor disponible

# Sentinel rendered into bundled policy documents when the operator hasn't
# filled in operator_name / operator_email / operator_jurisdiction.
document.not_configured = [sense configurar]
