[labels]

# Error labels used by respond_error(c, status, code, key, args). The key
# resolves through the user's language preference (or Accept-Language for
# anonymous requests) with the standard fallback chain. The `code` argument
# is the machine-readable identifier returned in the JSON `error` field;
# this catalog provides the human-readable `message` field.

