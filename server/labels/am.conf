# Rate limits
errors.rate_limit_exceeded = የተመን ገደብ ተሻግሯል። እባክዎ በኋላ እንደገና ይሞክሩ።
errors.too_many_logins = በጣም ብዙ የመግቢያ ሙከራዎች። እባክዎ በኋላ እንደገና ይሞክሩ።

# Interests summary fallback (used when no AI account is configured)
interests.summary.liked = ፍላጎት ያላቸው፡ {list}
interests.summary.disliked = የማይወዷቸው፡ {list}

# Login code email (sent by code_send → email_login_code)
email.login_code.subject = Mochi የመግቢያ ኮድ
