# Mochi server config baked into the Docker image.
#
# Override any value with environment variables of the form
# MOCHI_<SECTION>_<KEY>, uppercased. For example:
#   docker run -e MOCHI_EMAIL_ADMIN=ops@example.com ...
#   docker run -e MOCHI_WEB_PORTS=8080,8443 ...
#
# Or replace the file entirely:
#   docker run -v ./mochi.conf:/etc/mochi/mochi.conf:ro ...

[directories]
cache  = /var/cache/mochi
data   = /var/lib/mochi
ensure = true
uid    = 1000
gid    = 1000

[p2p]
port = 1443

[web]
ports    = 8080
compress = auto
