# Mochi main configuration file for Windows
# Default paths use %ProgramData%\Mochi\ — shared across users and accessible
# to the LocalSystem account that the mochi-server service runs under.

[directories]
# Uncomment and modify to use custom paths:
# cache = C:\ProgramData\Mochi\cache
# data = C:\ProgramData\Mochi\data

[email]
host = localhost
port = 25

[p2p]
port = 1443

[web]
# Listen on http://localhost/ only.
# Comment these lines out if uncommenting the lines below.
listen = 127.0.0.1
port = 80

# To listen on https://yourdomain/, comment out the above lines and
# uncomment these lines and set your domain.

#port = 443
#domain = yourdomain
