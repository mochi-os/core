# Server upgrade notifications (added by update_manager work)
update.notification.title = Mochi {version} дастрас аст
update.notification.body = Шумо {current}-ро иҷро мекунед. Барои навсозӣ саҳифаи ҳолати системаро кушоед.
update.notification.topic = Навсозии сервер дастрас аст

# Sentinel rendered into bundled policy documents when the operator hasn't
# filled in operator_name / operator_email / operator_jurisdiction.
document.not_configured = [танзим нашудааст]
