[labels]

# Error labels used by respond_error(c, status, code, key, args). The key
# resolves through the user's language preference (or Accept-Language for
# anonymous requests) with the standard fallback chain. The `code` argument
# is the machine-readable identifier returned in the JSON `error` field;
# this catalog provides the human-readable `message` field.

# Authentication / account state
errors.access_denied = Acceso denegado
errors.account_already_set_up = La cuenta ya está configurada
errors.app_required = Se requiere app
errors.app_token_mismatch = El token de la app no coincide
errors.app_token_required = Se requiere token de app
errors.authentication_failed = Falló la autenticación
errors.authentication_required = Se requiere autenticación
errors.auth_required_db = Se requiere autenticación para acceder a la base de datos
errors.ceremony_expired = El intento de inicio de sesión expiró. Inténtelo de nuevo.
errors.credential_not_found = Credencial no encontrada
errors.identity_required = Se requiere identidad
errors.invalid_code = Código no válido
errors.invalid_credential = Credencial no válida
errors.invalid_credentials = Credenciales no válidas
errors.invalid_email = Correo electrónico no válido
errors.invalid_method = Método no válido
errors.invalid_request = Solicitud no válida
errors.missing_code = Falta el código
errors.no_methods = No hay métodos de autenticación disponibles
errors.not_authenticated = No autenticado
errors.passkey_disabled = Las passkeys están deshabilitadas
errors.recovery_disabled = La recuperación está deshabilitada
errors.session_expired = Sesión expirada
errors.signup_disabled = El registro de nuevos usuarios está deshabilitado.
errors.suspended = Su cuenta ha sido suspendida.
errors.app_token_invalid = Token no válido para esta app
errors.unable_to_send_login_email = No se puede enviar el correo de inicio de sesión
errors.unsupported_method = Método no admitido
errors.user_error = Error de usuario
errors.user_not_found = Usuario no encontrado
errors.webauthn_error = Error de WebAuthn
errors.webauthn_not_configured = WebAuthn no está configurado

# OAuth providers
errors.unknown_provider = Proveedor desconocido
errors.provider_unavailable = Proveedor no disponible
errors.server_error = Error del servidor

# Apps / routing
errors.action_has_no_function = La acción no tiene función
errors.app_not_found = App no encontrada
errors.no_app_for_entity = No hay app para la entidad
errors.no_app_for_class = No hay app para la clase de entidad
errors.no_root_app = No hay app raíz configurada
errors.unknown_route_method = Método de ruta desconocido

# Resources
errors.attachment_not_found = Adjunto no encontrado
errors.entity_not_found = Entidad no encontrada
errors.file_not_found = Archivo no encontrado
errors.invalid_attachment_id = ID de adjunto no válido
errors.invalid_file = Archivo no válido
errors.no_file_specified = No se especificó un archivo
errors.not_found = No encontrado
errors.unable_to_cache_file = No se puede almacenar el archivo en caché
errors.unable_to_create_identity = No se puede crear la identidad

# Failed creation
errors.failed_to_create_token = No se pudo crear el token

# Database
errors.database_error = Error de base de datos

# i18n / labels endpoint
errors.invalid_language_tag = Etiqueta de idioma no válida
errors.labels_not_loaded = Etiquetas no cargadas
errors.language_not_installed = Idioma no instalado

# Rate limits
errors.rate_limit_exceeded = Límite de solicitudes excedido. Inténtelo de nuevo más tarde.
errors.too_many_logins = Demasiados intentos de inicio de sesión. Inténtelo de nuevo más tarde.

# Interests summary fallback (used when no AI account is configured)
interests.summary.liked = Interesado en: {list}
interests.summary.disliked = No le gusta: {list}

# Login code email (sent by code_send → email_login_code)
