name: Test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Replication-write guard
        # A plain db.exec write to a replicated core table (access/attachments/
        # permissions/log/acknowledged) never journals, so it silently doesn't
        # replicate (#166). Use db.exec_replicated/exec_app_user, or annotate an
        # intentional host-local write with `// exec-ok: <reason>`.
        run: python3 .github/scripts/check-core-replicated-writes.py --check

      - name: Build
        run: make

      - name: Test (fast)
        run: make test

  race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Test (race detector)
        # Race detector catches concurrent-write bugs in shared state -
        # the kind that show up under multi-master replication. Slower
        # (~8x) and requires cgo, so run as a separate job.
        run: make test-race
