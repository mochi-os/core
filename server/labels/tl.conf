[labels]

# Error labels used by respond_error(c, status, code, key, args). The key
# resolves through the user's language preference (or Accept-Language for
# anonymous requests) with the standard fallback chain. The `code` argument
# is the machine-readable identifier returned in the JSON `error` field;
# this catalog provides the human-readable `message` field.

# Authentication / account state
errors.access_denied = Hindi pinapayagan
errors.account_already_set_up = Naka-set up na ang account
errors.app_required = Kailangan ng app
errors.app_token_mismatch = Hindi tugma ang app token
errors.app_token_required = Kailangan ng app token
errors.authentication_failed = Nabigo ang authentication
errors.authentication_required = Kailangan ng authentication
errors.auth_required_db = Kailangan ng authentication para sa database access
errors.ceremony_expired = Nag-expire na ang sign-in attempt. Pakisubukan ulit.
errors.credential_not_found = Hindi nakita ang credential
errors.identity_required = Kailangan ng identity
errors.invalid_code = Hindi valid ang code
errors.invalid_credential = Hindi valid ang credential
errors.invalid_credentials = Hindi valid ang credentials
errors.invalid_email = Hindi valid ang email
errors.invalid_method = Hindi valid ang method
errors.invalid_request = Hindi valid ang request
errors.missing_code = Nawawala ang code
errors.no_methods = Walang available na authentication methods
errors.not_authenticated = Hindi authenticated
errors.passkey_disabled = Naka-disable ang passkeys
errors.recovery_disabled = Naka-disable ang recovery
errors.session_expired = Nag-expire na ang session
errors.signup_disabled = Naka-disable ang new user signup.
errors.suspended = Na-suspend na ang iyong account.
errors.app_token_invalid = Hindi valid ang token para sa app na ito
errors.unable_to_send_login_email = Hindi makapagpadala ng login email
errors.unsupported_method = Hindi sinusuportahang method
errors.user_error = User error
errors.user_not_found = Hindi nakita ang user
errors.webauthn_error = WebAuthn error
errors.webauthn_not_configured = Hindi naka-configure ang WebAuthn

# OAuth providers
errors.unknown_provider = Hindi kilalang provider
errors.provider_unavailable = Hindi available ang provider
errors.server_error = Server error

# Apps / routing
errors.action_has_no_function = Walang function ang action
errors.app_not_found = Hindi nakita ang app
errors.no_app_for_entity = Walang app para sa entity
errors.no_app_for_class = Walang app para sa entity class
errors.no_root_app = Walang naka-configure na root app
errors.unknown_route_method = Hindi kilalang route method

# Resources
errors.attachment_not_found = Hindi nakita ang attachment
errors.entity_not_found = Hindi nakita ang entity
errors.file_not_found = Hindi nakita ang file
errors.invalid_attachment_id = Hindi valid ang attachment ID
errors.invalid_file = Hindi valid ang file
errors.no_file_specified = Walang tinukoy na file
errors.not_found = Hindi nakita
errors.unable_to_cache_file = Hindi ma-cache ang file
errors.unable_to_create_identity = Hindi makagawa ng identity

# Failed creation
errors.failed_to_create_token = Nabigong gumawa ng token

# Database
errors.database_error = Database error

# i18n / labels endpoint
errors.invalid_language_tag = Hindi valid ang language tag
errors.labels_not_loaded = Hindi na-load ang mga label
errors.language_not_installed = Hindi naka-install ang wika

# Rate limits
errors.rate_limit_exceeded = Lumampas sa rate limit. Pakisubukan ulit mamaya.
errors.too_many_logins = Masyadong maraming login attempts. Pakisubukan ulit mamaya.

# Interests summary fallback (used when no AI account is configured)
interests.summary.liked = Interesado sa: {list}
interests.summary.disliked = Hindi gusto: {list}

# Login code email (sent by code_send → email_login_code)
email.login_code.subject = Mochi login code
email.login_code.heading = Login Code
email.login_code.tagline = Ilagay ang code na ito sa iyong browser para mag-sign in
email.login_code.expiry = Mag-e-expire ang code na ito sa loob ng 1 oras
email.login_code.ignore = Kung hindi ka humiling ng code na ito, maaari mong huwag pansinin ang email na ito.
email.login_code.text_intro = Ang iyong Mochi login code ay: {code}
email.login_code.text_body = Ilagay ang code na ito sa iyong browser para mag-sign in. Mag-e-expire ang code sa loob ng 1 oras.

# Email-account verification email (sent by account_send_verification_email)
