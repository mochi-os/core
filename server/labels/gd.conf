[labels]

# Error labels used by respond_error(c, status, code, key, args). The key
# resolves through the user's language preference (or Accept-Language for
# anonymous requests) with the standard fallback chain. The `code` argument
# is the machine-readable identifier returned in the JSON `error` field;
# this catalog provides the human-readable `message` field.

# Authentication / account state
errors.access_denied = Inntrigeadh air a dhiùltadh
errors.account_already_set_up = Chaidh an cunntas a stèidheachadh mu thràth
errors.app_required = Tha feum air aplacaid
errors.app_token_mismatch = Mì-fhreagarrachd tòcan aplacaid
errors.app_token_required = Tha feum air tòcan aplacaid
errors.authentication_failed = Dh'fhàillig le dearbhadh
errors.authentication_required = Tha feum air dearbhadh
errors.auth_required_db = Tha feum air dearbhadh airson inntrigeadh stòr-dàta
errors.ceremony_expired = Dh'fhalbh an oidhirp clàraidh a-steach. Feuch ris a-rithist.
errors.credential_not_found = Cha deach an teisteanas a lorg
errors.identity_required = Tha feum air dearbh-aithne
errors.invalid_code = Còd mì-dhligheach
errors.invalid_credential = Teisteanas mì-dhligheach
errors.invalid_credentials = Teisteanasan mì-dhligheach
errors.invalid_email = Post-d mì-dhligheach
errors.invalid_method = Dòigh mhì-dhligheach
errors.invalid_request = Iarrtas mì-dhligheach
errors.missing_code = Còd a dhìth
errors.no_methods = Chan eil dòighean dearbhaidh ri làimh
errors.not_authenticated = Gun dearbhadh
errors.passkey_disabled = Tha passkey-an dheth
errors.recovery_disabled = Tha aiseag dheth
errors.session_expired = Dh'fhalbh an seisean
errors.signup_disabled = Chan eil clàradh cleachdaiche ùr ri làimh.
errors.suspended = Chaidh do chunntas a chur à comas.
errors.app_token_invalid = Chan eil an tòcan dligheach airson na h-aplacaid seo
errors.unable_to_send_login_email = Cha b' urrainnear post-d clàraidh a-steach a chur
errors.unsupported_method = Dòigh nach eil ri làimh
errors.user_error = Mearachd cleachdaiche
errors.user_not_found = Cha deach an cleachdaiche a lorg
errors.webauthn_error = Mearachd WebAuthn
errors.webauthn_not_configured = Chan eil WebAuthn air a rèiteachadh

# OAuth providers
errors.unknown_provider = Solaraiche neo-aithnichte
errors.provider_unavailable = Chan eil an solaraiche ri làimh
errors.server_error = Mearachd frithealaiche

# Apps / routing
errors.action_has_no_function = Chan eil gnìomh aig an ghnìomh
errors.app_not_found = Cha deach an aplacaid a lorg
errors.no_app_for_entity = Gun aplacaid airson an eintiteis
errors.no_app_for_class = Gun aplacaid airson clas an eintiteis
errors.no_root_app = Gun aplacaid freumha air a rèiteachadh
errors.unknown_route_method = Dòigh slighe neo-aithnichte

# Resources
errors.attachment_not_found = Cha deach an ceanglachan a lorg
errors.entity_not_found = Cha deach an t-eintiteas a lorg
errors.file_not_found = Cha deach am faidhle a lorg
errors.invalid_attachment_id = ID ceanglachain mì-dhligheach
errors.invalid_file = Faidhle mì-dhligheach
errors.no_file_specified = Cha deach faidhle a shònrachadh
errors.not_found = Cha deach a lorg
errors.unable_to_cache_file = Cha b' urrainnear am faidhle a thasgadh
errors.unable_to_create_identity = Cha b' urrainnear dearbh-aithne a chruthachadh

# Failed creation
errors.failed_to_create_token = Dh'fhàillig le cruthachadh tòcain

# Database
errors.database_error = Mearachd stòr-dàta

# i18n / labels endpoint
errors.invalid_language_tag = Taga cànain mì-dhligheach
errors.labels_not_loaded = Cha deach na leubailean a luchdachadh
errors.language_not_installed = Cha deach an cànan a stàladh

# Rate limits
errors.rate_limit_exceeded = Chaidh a' chrìoch luaths thairis. Feuch ris a-rithist an ceann tamaill.
errors.too_many_logins = Cus oidhirpean clàraidh a-steach. Feuch ris a-rithist an ceann tamaill.

# Interests summary fallback (used when no AI account is configured)
interests.summary.liked = Ùidh ann an: {list}
interests.summary.disliked = Cha toigh leibh: {list}

# Login code email (sent by code_send → email_login_code)
email.login_code.subject = Còd clàraidh a-steach Mochi
email.login_code.heading = Còd Clàraidh a-steach
email.login_code.tagline = Cuir a-steach an còd seo san bhrabhsair agad airson clàradh a-steach
email.login_code.expiry = Falbhaidh an còd seo ann an 1 uair
email.login_code.ignore = Mura do dh'iarr sibh an còd seo, faodaidh sibh am post-d seo a leigeil seachad gu sàbhailte.
email.login_code.text_intro = 'S e do chòd clàraidh a-steach Mochi: {code}
email.login_code.text_body = Cuir a-steach an còd seo san bhrabhsair agad airson clàradh a-steach. Falbhaidh an còd ann an 1 uair.

# Email-account verification email (sent by account_send_verification_email)
email.verification.subject = Dearbh do sheòladh puist-d
email.verification.heading = Còd Dearbhaidh
email.verification.tagline = Cuir a-steach an còd seo airson do sheòladh puist-d a dhearbhadh
email.verification.expiry = Falbhaidh an còd seo ann an 1 uair
email.verification.ignore = Mura do dh'iarr sibh an dearbhadh seo, faodaidh sibh am post-d seo a leigeil seachad gu sàbhailte.

# Test notification email and push notification
email.test.subject = Brath deuchainn Mochi
email.test.heading = Brath deuchainn Mochi
push.test.title = Brath deuchainn Mochi
errors.shutdown_in_progress = Tha dùnadh sìos a' dol air adhart mu thràth

# OAuth error labels (PKCE / mobile flow)
errors.exchange_invalid = Cha deach an iomlaid a lorg no thàinig i gu crìch
errors.exchange_verifier_mismatch = Chan eil dearbhadair PKCE a' freagairt ris an dùbhlan
errors.invalid_challenge = Dùbhlan PKCE mì-dhligheach
errors.invalid_scheme = Sgeama ath-stiùiridh fòn-làimhe mì-dhligheach

# Server upgrade notifications (added by update_manager work)
update.notification.title = Tha Mochi {version} ri làimh
update.notification.body = Tha thu a' ruith {current}.
update.notification.topic = Ùrachadh frithealaiche ri làimh

# Sentinel rendered into bundled policy documents when the operator hasn't
# filled in operator_name / operator_email / operator_jurisdiction.
document.not_configured = [gun rèiteachadh]
