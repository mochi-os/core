email.login_code.tagline = Ingrese este código en su navegador para iniciar sesión
email.login_code.expiry = Este código expira en 1 hora
email.login_code.ignore = Si no solicitó este código, puede ignorar este correo electrónico de forma segura.
email.login_code.text_intro = Su código de inicio de sesión de Mochi es: {code}
email.login_code.text_body = Ingrese este código en su navegador para iniciar sesión. El código expira en 1 hora.

